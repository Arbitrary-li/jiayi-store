<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>佳一女装</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pink:#e91e63;--bg:#f2f2f2;--card:#fff;--text:#333;--muted:#999;--border:#eee}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:600px;margin:0 auto}

.header{padding:16rpx 24rpx;background:var(--card);display:flex;align-items:center;gap:16rpx}
.search-box{flex:1;display:flex;align-items:center;position:relative}
.search-box input{width:100%;height:64rpx;border:none;border-radius:32rpx;padding:0 56rpx 0 28rpx;font-size:26rpx;background:#f5f5f5;outline:none}
.search-icon{position:absolute;right:20rpx;font-size:28rpx}

.cat-bar{white-space:nowrap;background:var(--card);padding:14rpx 24rpx;border-bottom:1rpx solid #f0f0f0;overflow-x:auto;scrollbar-width:none}
.cat-bar::-webkit-scrollbar{display:none}
.cat-tag{display:inline-block;padding:10rpx 20rpx;font-size:24rpx;color:#666;margin-right:8rpx;border-radius:20rpx;background:#f5f5f5;cursor:pointer;user-select:none}
.cat-tag.active{color:#fff;background:var(--pink);font-weight:600}

.filter-bar{background:var(--card);padding:0 24rpx}
.filter-title{padding:18rpx 0;font-size:24rpx;color:var(--muted);display:flex;align-items:center;gap:6rpx;cursor:pointer}
.filter-title .arr{transition:transform .3s}
.filter-title .arr.open{transform:rotate(90deg)}
.filter-body{padding-bottom:14rpx}
.filter-row{white-space:nowrap;margin-bottom:10rpx;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;gap:6rpx;padding:8rpx 20rpx;border-radius:20rpx;font-size:22rpx;margin-right:10rpx;background:#f5f5f5;cursor:pointer;user-select:none}
.chip.active{background:var(--pink);color:#fff}

.main{padding:12rpx 12rpx 40rpx}
.count-text{font-size:22rpx;color:var(--muted);padding:8rpx 8rpx 12rpx}
.grid{display:flex;flex-wrap:wrap;gap:12rpx}
.card{width:calc(50% - 6rpx);background:var(--card);border-radius:12rpx;overflow:hidden;cursor:pointer}
.card-img{width:100%;height:340rpx;overflow:hidden;position:relative;background:#f5f5f5}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-img .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64rpx}
.card-body{padding:14rpx 16rpx 16rpx}
.card-name{font-size:26rpx;line-height:1.4;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:6rpx}
.card-meta{display:flex;gap:6rpx;margin-bottom:10rpx;flex-wrap:wrap}
.card-meta .tag{font-size:20rpx;color:var(--pink);padding:2rpx 8rpx;border:1rpx solid #fce4ec;border-radius:6rpx}
.card-footer{display:flex;justify-content:space-between;align-items:center}
.price{font-size:32rpx;font-weight:700;color:var(--pink)}
.cart-btn{width:52rpx;height:52rpx;border-radius:50%;background:var(--pink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24rpx;cursor:pointer;border:none}

.empty{text-align:center;padding:120rpx;color:var(--muted);font-size:28rpx}
.admin-link{text-align:center;padding:40rpx;font-size:22rpx;color:#ddd;cursor:pointer}

/* 详情 */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;display:none}
.detail-overlay.on{display:flex}
.detail-modal{background:var(--card);border-radius:16rpx;width:95%;max-height:90vh;overflow-y:auto}
.detail-img{width:100%;aspect-ratio:4/3;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden}
.detail-img img{width:100%;height:100%;object-fit:contain}
.detail-close{position:absolute;top:16rpx;right:16rpx;width:36rpx;height:36rpx;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;font-size:20rpx;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center}
.detail-body{padding:24rpx}
.detail-price{font-size:48rpx;font-weight:700;color:var(--pink);margin-bottom:8rpx}
.detail-name{font-size:32rpx;font-weight:600;line-height:1.5;margin-bottom:16rpx}
.detail-meta{display:flex;gap:12rpx;flex-wrap:wrap;margin-bottom:16rpx}
.detail-meta .tag{font-size:24rpx;background:#f5f5f5;padding:8rpx 18rpx;border-radius:16rpx;color:var(--muted)}
.detail-notes{font-size:28rpx;color:#666;line-height:1.8;background:#fafafa;padding:24rpx;border-radius:12rpx;margin-bottom:16rpx}
.detail-act{display:flex;gap:16rpx}
.detail-act button{flex:1;border-radius:40rpx;font-size:28rpx;padding:20rpx;border:none;cursor:pointer;font-weight:600}
.add-cart{background:var(--pink);color:#fff}
.go-cart{background:#fff;color:var(--pink);border:2rpx solid var(--pink)}

/* 购物车面板 */
.cart-panel{position:fixed;top:0;right:-100%;width:100%;max-width:400px;bottom:0;background:var(--card);z-index:150;transition:right .3s;display:flex;flex-direction:column}
.cart-panel.open{right:0}
.cart-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:149;display:none}
.cart-backdrop.on{display:block}
.cart-head{padding:20rpx;border-bottom:1rpx solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cart-close{width:34rpx;height:34rpx;border-radius:50%;border:none;background:#f5f5f5;cursor:pointer;font-size:18rpx}
.cart-body{flex:1;overflow-y:auto;padding:20rpx}
.cart-item{display:flex;gap:14rpx;padding:12rpx;border-radius:12rpx;margin-bottom:10rpx;background:#fafafa;align-items:center}
.cart-item-img{width:56rpx;height:56rpx;border-radius:10rpx;overflow:hidden;background:#f0f0f0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28rpx}
.cart-item-img img{width:100%;height:100%;object-fit:cover}
.cart-item-info{flex:1}
.cart-item-name{font-weight:600;font-size:14px}
.cart-item-row{display:flex;align-items:center;gap:8rpx;margin-top:6rpx}
.cart-qty-btn{padding:2rpx 8rpx;border:1rpx solid var(--border);border-radius:20rpx;cursor:pointer;background:#fff;font-size:14rpx}
.cart-item-price{margin-left:auto;font-weight:700;color:var(--pink)}
.cart-foot{padding:20rpx;border-top:1rpx solid var(--border)}
.cart-total{font-size:20rpx;font-weight:700;color:var(--pink);text-align:center;margin-bottom:12rpx}

.btn{padding:9rpx 20rpx;border-radius:20rpx;border:none;font-size:13rpx;cursor:pointer;font-weight:600}
.btn-primary{background:var(--pink);color:#fff;width:100%;padding:14rpx}
.btn-outline{background:#fff;color:var(--pink);border:2rpx solid var(--pink)}

.toast{position:fixed;top:20rpx;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12rpx 24rpx;border-radius:24rpx;font-size:14rpx;z-index:999;animation:in .3s}
@keyframes in{from{opacity:0}}
</style>
</head>
<body>

<div class="header">
  <div class="search-box">
    <input placeholder="搜索衣服..." oninput="filter()">
    <span class="search-icon">🔍</span>
  </div>
  <button class="btn btn-outline" onclick="openCart()" style="position:relative">🛒<span id="cartBadge" style="position:absolute;top:-6rpx;right:-6rpx;background:var(--pink);color:#fff;font-size:10rpx;min-width:18rpx;height:18rpx;border-radius:9rpx;display:none">0</span></button>
</div>

<div class="cat-bar" id="catBar"></div>

<div class="filter-bar">
  <div class="filter-title" onclick="toggleFilter()">🔻 筛选<span class="arr" id="filterArr">▾</span></div>
  <div class="filter-body" id="filterBody" style="display:none">
    <div class="filter-row" id="seasonRow"></div>
  </div>
</div>

<div class="main">
  <div class="count-text" id="countText"></div>
  <div class="grid" id="goodsGrid"></div>
  <div class="empty" id="emptyState" style="display:none">📭 暂无商品</div>
  <div class="admin-link" id="adminLink" style="display:none" onclick="location.href='admin.html'">⚙️ 管理</div>
</div>

<!-- 详情 -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail()">
  <div class="detail-modal" onclick="event.stopPropagation()">
    <div class="detail-img" id="detailImg"></div>
    <div class="detail-body">
      <div class="detail-price" id="detailPrice"></div>
      <div class="detail-name" id="detailName"></div>
      <div class="detail-meta" id="detailMeta"></div>
      <div class="detail-notes" id="detailNotes"></div>
      <div class="detail-act">
        <button class="add-cart" onclick="detailAddCart()">🛒 加入购物车</button>
        <button class="go-cart" onclick="openCart()">去购物车</button>
      </div>
    </div>
  </div>
</div>

<!-- 购物车 -->
<div class="cart-backdrop" id="cartBack" onclick="closeCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-head"><h3>🛒 购物车</h3><button class="cart-close" onclick="closeCart()">✕</button></div>
  <div class="cart-body" id="cartBody"></div>
  <div class="cart-foot" id="cartFoot" style="display:none">
    <div class="cart-total" id="cartTotal"></div>
    <button class="btn btn-primary" onclick="sendOrder()">📋 复制订单发给商家</button>
  </div>
</div>

<div id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const sb = supabase.createClient('https://rixhfnacmselwjtlaohn.supabase.co','sb_publishable_mlPbrrg5TdAq6wh8RZ8CNA_sid5pubv');

const CATS=[{id:'top',n:'上衣',e:'👕'},{id:'pants',n:'裤子',e:'👖'},{id:'skirt',n:'裙子',e:'👗'},{id:'outer',n:'外套',e:'🧥'},{id:'dress',n:'连衣裙',e:'👘'},{id:'shoes',n:'鞋子',e:'👟'},{id:'acc',n:'配饰',e:'👜'},{id:'sport',n:'运动装',e:'🎽'}];
const SEASONS=['春','夏','秋','冬'];
const cm=Object.fromEntries(CATS.map(c=>[c.id,c.n]));

let goods=[],currentCat='all',seasonFilter='',cart=[],detailId=null;

function loadCart(){try{cart=JSON.parse(localStorage.getItem('jiayi_cart')||'[]')}catch(e){cart=[]}updateBadge()}
function saveCart(){localStorage.setItem('jiayi_cart',JSON.stringify(cart));updateBadge()}
function updateBadge(){const n=cart.reduce((s,i)=>s+i.qty,0);const b=document.getElementById('cartBadge');if(n>0){b.style.display='flex';b.textContent=n}else b.style.display='none'}

async function load(){
  const{data}=await sb.from('goods').select('id,name,category,price,season,notes,image,images').order('created_at',{ascending:false});
  goods=data||[];render()
}

function render(){
  renderCats();renderSeasons();renderGoods();
  document.getElementById('adminLink').style.display=localStorage.getItem('admin_pwd')?'block':'none';
}

function renderCats(){
  const cnt={};goods.forEach(g=>{cnt[g.category]=(cnt[g.category]||0)+1});
  let h=`<span class="cat-tag ${currentCat==='all'?'active':''}" onclick="setCat('all')">全部(${goods.length})</span>`;
  CATS.forEach(c=>h+=`<span class="cat-tag ${currentCat===c.id?'active':''}" onclick="setCat('${c.id}')">${c.e} ${c.n}(${cnt[c.id]||0})</span>`);
  document.getElementById('catBar').innerHTML=h;
}

function renderSeasons(){
  document.getElementById('seasonRow').innerHTML=SEASONS.map(s=>`<span class="chip ${seasonFilter===s?'active':''}" onclick="setSeason('${s}')">${s}季</span>`).join('');
}

function renderGoods(){
  let f=goods;
  if(currentCat!=='all')f=f.filter(g=>g.category===currentCat);
  if(seasonFilter)f=f.filter(g=>(g.season||[]).includes(seasonFilter));
  const kw=document.querySelector('.search-box input').value.trim().toLowerCase();
  if(kw)f=f.filter(g=>g.name.toLowerCase().includes(kw));
  document.getElementById('countText').textContent='共 '+f.length+' 件';
  const grid=document.getElementById('goodsGrid');
  if(!f.length){grid.innerHTML='';document.getElementById('emptyState').style.display='block';return}
  document.getElementById('emptyState').style.display='none';
  grid.innerHTML=f.map(g=>{
    const img=g.images&&g.images.length?g.images[0]:g.image||'';
    return `<div class="card" onclick="openDetail('${g.id}')">
      <div class="card-img">${img?`<img src="${img}">`:`<div class="ph">${CATS.find(c=>c.id===g.category)?.e||'👔'}</div>`}</div>
      <div class="card-body">
        <div class="card-name">${esc(g.name)}</div>
        <div class="card-meta">${(g.season||[]).map(s=>`<span class="tag">${s}季</span>`).join('')}</div>
        <div class="card-footer"><span class="price">¥${g.price||'--'}</span><button class="cart-btn" onclick="event.stopPropagation();addCart('${g.id}')">🛒</button></div>
      </div></div>`;
  }).join('');
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function setCat(c){currentCat=c;renderCats();renderGoods()}
function setSeason(s){seasonFilter=seasonFilter===s?'':s;renderSeasons();renderGoods()}
function toggleFilter(){const b=document.getElementById('filterBody');const a=document.getElementById('filterArr');b.style.display=b.style.display==='none'?'block':'none';a.classList.toggle('open')}
function filter(){renderGoods()}

// 详情
function openDetail(id){
  const g=goods.find(x=>x.id===id);if(!g)return;detailId=id;
  const cat=CATS.find(c=>c.id===g.category);
  const img=g.images&&g.images.length?g.images[0]:g.image||'';
  document.getElementById('detailImg').innerHTML=img?`<img src="${img}">`:`<div style="font-size:100rpx">${cat?.e||'👔'}</div>`;
  document.getElementById('detailPrice').innerHTML='¥'+(g.price||'--');
  document.getElementById('detailName').textContent=g.name;
  document.getElementById('detailMeta').innerHTML=`<span class="tag">${cat?.e||''} ${cat?.n||g.category}</span>${(g.season||[]).map(s=>`<span class="tag">${s}季</span>`).join('')}`;
  document.getElementById('detailNotes').textContent=g.notes||'暂无描述';
  document.getElementById('detailOverlay').classList.add('on');
}

function closeDetail(){document.getElementById('detailOverlay').classList.remove('on')}
function detailAddCart(){if(detailId)addCart(detailId)}

// 购物车
function addCart(id){
  const g=goods.find(x=>x.id===id);if(!g)return;
  const found=cart.find(i=>i.id===id);
  if(found)found.qty++;else cart.push({id:g.id,name:g.name,price:g.price,images:g.images,image:g.image,category:g.category,qty:1});
  saveCart();toast('已加入购物车')
}

function openCart(){renderCart();document.getElementById('cartPanel').classList.add('open');document.getElementById('cartBack').classList.add('on')}
function closeCart(){document.getElementById('cartPanel').classList.remove('open');document.getElementById('cartBack').classList.remove('on')}

function renderCart(){
  const body=document.getElementById('cartBody'),foot=document.getElementById('cartFoot');
  if(!cart.length){body.innerHTML='<div style="text-align:center;padding:40rpx;color:var(--muted)">🛒 购物车是空的</div>';foot.style.display='none';return}
  body.innerHTML=cart.map((item,i)=>`
    <div class="cart-item">
      <div class="cart-item-img">${item.images&&item.images.length?`<img src="${item.images[0]}">`:item.image?`<img src="${item.image}">`:'👔'}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${esc(item.name)}</div>
        <div class="cart-item-row">
          <button class="cart-qty-btn" onclick="changeQty(${i},-1)">-</button>
          <span>${item.qty}</span>
          <button class="cart-qty-btn" onclick="changeQty(${i},1)">+</button>
          <span class="cart-item-price">¥${(item.price*item.qty).toFixed(2)}</span>
        </div>
      </div></div>`).join('');
  document.getElementById('cartTotal').textContent='💰 '+cart.reduce((s,i)=>s+i.qty,0)+'件 · ¥'+cart.reduce((s,i)=>s+i.price*i.qty,0).toFixed(2);
  foot.style.display='block'
}

function changeQty(i,d){cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);saveCart();renderCart()}
function sendOrder(){
  let m='🛍️ 你好，我想下单：\n\n';
  cart.forEach((i,k)=>m+=`${k+1}. ${i.name} ×${i.qty} ¥${(i.price*i.qty).toFixed(2)}\n`);
  m+=`\n💰 共 ¥${cart.reduce((s,i)=>s+i.price*i.qty,0).toFixed(2)}`;
  navigator.clipboard.writeText(m).then(()=>toast('订单已复制，发给商家即可'))
}

function toast(m){const c=document.getElementById('toastContainer'),e=document.createElement('div');e.className='toast';e.textContent=m;c.appendChild(e);setTimeout(()=>e.remove(),2200)}

loadCart();load();
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDetail();closeCart()}});
</script>
</body>
</html>
