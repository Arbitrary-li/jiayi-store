<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>佳一女装 - 商家管理</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --pink:#e91e63; --pink-light:#fce4ec; --bg:#f5f5f5; --card:#fff; --text:#333; --muted:#999; --border:#eee; }
body { font-family:'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* 登录 */
.login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; background:linear-gradient(135deg,#fce4ec,#f8bbd0); }
.login-box { background:#fff; border-radius:24px; padding:48px 32px; width:90%; max-width:360px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.1); }
.login-box h1 { font-size:32px; margin-bottom:8px; }
.login-box .sub { color:var(--muted); font-size:14px; margin-bottom:32px; }
.login-box input { width:100%; padding:14px; border:2px solid var(--border); border-radius:12px; font-size:16px; text-align:center; outline:none; margin-bottom:20px; }
.login-box input:focus { border-color:var(--pink); }
.login-box .err { color:#e53935; font-size:13px; margin-bottom:12px; display:none; }

.btn { padding:12px 24px; border-radius:24px; border:none; font-size:14px; cursor:pointer; font-weight:600; transition:all .2s; display:inline-flex; align-items:center; gap:6px; }
.btn-primary { background:linear-gradient(135deg,#e91e63,#c2185b); color:#fff; width:100%; justify-content:center; padding:14px; font-size:16px; box-shadow:0 4px 12px rgba(233,30,99,0.3); }
.btn-outline { background:#fff; color:var(--pink); border:2px solid var(--pink); }
.btn-ghost { background:#fff; color:var(--muted); border:2px solid var(--border); }
.btn-danger { background:#e53935; color:#fff; }
.btn-sm { padding:8px 16px; font-size:12px; }

/* 管理界面 */
.admin-page { display:none; max-width:800px; margin:0 auto; padding-bottom:40px; }
.toolbar { display:flex; align-items:center; padding:16px 20px; background:#fff; gap:10px; flex-wrap:wrap; position:sticky; top:0; z-index:10; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
.toolbar-title { font-size:20px; font-weight:800; flex:1; }
.status-bar { display:flex; justify-content:space-between; padding:14px 20px; font-size:13px; color:var(--muted); }
.status-link { color:var(--pink); font-weight:600; cursor:pointer; }
.batch-bar { padding:0 20px 14px; }
.batch-bar .btn { width:100%; justify-content:center; }

/* 商品列表 */
.goods-list { padding:0 20px; }
.goods-item { display:flex; gap:14px; padding:16px; background:#fff; border-radius:14px; margin-bottom:10px; align-items:center; }
.goods-check { width:36px; height:36px; border-radius:50%; border:2px solid #ddd; display:flex; align-items:center; justify-content:center; font-size:16px; color:#fff; flex-shrink:0; cursor:pointer; }
.goods-check.on { background:var(--pink); border-color:var(--pink); }
.goods-img { width:80px; height:100px; border-radius:10px; object-fit:cover; flex-shrink:0; background:#f5f5f5; }
.goods-img-placeholder { width:80px; height:100px; border-radius:10px; background:#f5f5f5; display:flex; align-items:center; justify-content:center; font-size:32px; flex-shrink:0; }
.goods-info { flex:1; overflow:hidden; }
.goods-name { font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.goods-meta { font-size:12px; color:var(--muted); margin-top:4px; }
.goods-actions { display:flex; flex-direction:column; gap:10px; font-size:18px; cursor:pointer; }
.goods-actions span:hover { opacity:.7; }

/* 弹窗 */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; display:flex; align-items:flex-end; animation:in .2s; }
@keyframes in { from{opacity:0} to{opacity:1} }
.modal { background:#fff; border-radius:24px 24px 0 0; padding:28px; width:100%; max-height:90vh; overflow-y:auto; max-width:600px; margin:0 auto; }
.modal h3 { text-align:center; margin-bottom:20px; font-size:18px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; font-weight:600; color:#555; margin-bottom:6px; }
.form-group input, .form-group textarea { width:100%; padding:12px; border:2px solid var(--border); border-radius:10px; font-size:14px; outline:none; background:#fafafa; }
.form-group input:focus, .form-group textarea:focus { border-color:var(--pink); background:#fff; }
.form-group textarea { resize:vertical; min-height:60px; }
.form-row { display:flex; gap:12px; }

/* 图片网格 */
.img-grid { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
.img-cell { position:relative; width:120px; height:120px; }
.img-cell img { width:100%; height:100%; object-fit:cover; border-radius:8px; }
.img-cell .del { position:absolute; top:-6px; right:-6px; width:26px; height:26px; background:#e53935; color:#fff; border-radius:50%; text-align:center; line-height:26px; font-size:14px; cursor:pointer; }
.img-add { width:120px; height:120px; border:2px dashed #ddd; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:40px; color:#ccc; cursor:pointer; }
.img-add:hover { border-color:var(--pink); color:var(--pink); }

/* 标签 */
.tag-row { display:flex; gap:8px; flex-wrap:wrap; }
.tag-chip { padding:8px 20px; border-radius:20px; font-size:13px; border:2px solid var(--border); cursor:pointer; background:#fff; }
.tag-chip.on { background:var(--pink); color:#fff; border-color:var(--pink); }

.form-actions { display:flex; gap:12px; margin-top:24px; }
.form-actions button { flex:1; justify-content:center; }

.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:12px 24px; border-radius:24px; font-size:14px; z-index:999; animation:in .3s; }
</style>
</head>
<body>

<!-- 登录 -->
<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h1>佳一女装</h1>
    <p class="sub">商家管理后台</p>
    <input type="password" id="pwdInput" placeholder="管理密码" onkeydown="if(event.key==='Enter')login()">
    <div class="err" id="loginErr">密码错误</div>
    <button class="btn btn-primary" onclick="login()">进入后台</button>
  </div>
</div>

<!-- 管理界面 -->
<div class="admin-page" id="adminPage">
  <div class="toolbar">
    <span class="toolbar-title">佳一女装</span>
    <button class="btn btn-outline btn-sm" onclick="openModal()">+ 添加</button>
    <button class="btn btn-outline btn-sm" onclick="window.open('index.html')">👁 看店铺</button>
    <button class="btn btn-sm" id="editModeBtn" onclick="toggleEditMode()">☑ 编辑</button>
    <button class="btn btn-ghost btn-sm" onclick="logout()">退出</button>
  </div>
  <div class="status-bar">
    <span id="statusText">加载中...</span>
    <span class="status-link" id="selectAllBtn" style="display:none;" onclick="selectAll()">全选</span>
  </div>
  <div class="batch-bar" id="batchBar" style="display:none;">
    <button class="btn btn-danger" onclick="batchDelete()">🗑 删除已选</button>
  </div>
  <div class="goods-list" id="goodsList"></div>
</div>

<!-- 编辑弹窗 -->
<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle">添加商品</h3>
    <form id="goodsForm" onsubmit="save(event)">
      <input type="hidden" id="gId">

      <div class="form-group">
        <label>商品图片 (<span id="imgCount">0</span>/9)</label>
        <div class="img-grid" id="imgGrid">
          <div class="img-add" onclick="chooseImages()">+</div>
        </div>
        <input type="hidden" id="gImages" value="[]">
        <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this)" style="display:none;">
      </div>

      <div class="form-group"><label>名称 *</label><input id="gName" required placeholder="例如：复古碎花连衣裙"></div>
      <div class="form-row">
        <div class="form-group" style="flex:1;"><label>分类</label><select id="gCategory"></select></div>
        <div class="form-group" style="flex:1;"><label>价格 ¥</label><input type="number" id="gPrice" placeholder="299" min="0" step="0.01"></div>
      </div>
      <div class="form-group"><label>备注</label><textarea id="gNotes" placeholder="面料、尺码、风格..."></textarea></div>
      <div class="form-group">
        <label>季节</label>
        <div class="tag-row" id="seasonTags"></div>
        <input type="hidden" id="gSeason" value="[]">
        <input type="hidden" id="gColor" value="">
        <input type="hidden" id="gFeatured" value="false">
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button type="submit" class="btn btn-primary">💾 保存</button>
      </div>
    </form>
  </div>
</div>

<div id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ============ Supabase ============
const sb = supabase.createClient(
  'https://rixhfnacmselwjtlaohn.supabase.co',
  'sb_publishable_mlPbrrg5TdAq6wh8RZ8CNA_sid5pubv'
);

const CATS = [
  { id:'top',name:'上衣',emoji:'👕' },{ id:'pants',name:'裤子',emoji:'👖' },
  { id:'skirt',name:'裙子',emoji:'👗' },{ id:'outer',name:'外套',emoji:'🧥' },
  { id:'dress',name:'连衣裙',emoji:'👘' },{ id:'shoes',name:'鞋子',emoji:'👟' },
  { id:'acc',name:'配饰',emoji:'👜' },{ id:'sport',name:'运动装',emoji:'🎽' }
];
const SEASONS = ['春','夏','秋','冬'];
const catMap = Object.fromEntries(CATS.map(c=>[c.id,c.name]));
const catEmoji = Object.fromEntries(CATS.map(c=>[c.id,c.emoji]));

let goods = [], editMode = false, editImages = [];

// ============ 登录 ============
function login() {
  const pwd = localStorage.getItem('admin_pwd')||'jiayi2024';
  if (document.getElementById('pwdInput').value === pwd) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    loadGoods();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('pwdInput').value = '';
  }
}
function logout() {
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('pwdInput').value = '';
}

// ============ 数据 ============
async function loadGoods() {
  const { data, error } = await sb.from('goods').select('id,name,category,price,image,images,featured').order('created_at',{ascending:false});
  if (error) { toast('加载失败'); return; }
  goods = (data||[]).map(g => ({...g, imgCount:(g.images||[]).length||(g.image?1:0), _checked:false}));
  render();
}

function render() {
  const n = goods.length;
  const sel = goods.filter(g=>g._checked).length;
  document.getElementById('statusText').textContent = `共 ${n} 件${editMode?' · 已选 '+sel:''}`;
  document.getElementById('selectAllBtn').style.display = editMode?'inline':'none';
  document.getElementById('selectAllBtn').textContent = sel===n?'取消全选':'全选';
  document.getElementById('batchBar').style.display = editMode&&sel>0?'block':'none';

  document.getElementById('goodsList').innerHTML = goods.map(g => `
    <div class="goods-item">
      ${editMode?`<div class="goods-check ${g._checked?'on':''}" onclick="toggleCheck('${g.id}')">${g._checked?'✓':''}</div>`:''}
      ${g.images&&g.images.length?`<img src="${g.images[0]}" class="goods-img">`:g.image?`<img src="${g.image}" class="goods-img">`:`<div class="goods-img-placeholder">👔</div>`}
      <div class="goods-info">
        <div class="goods-name">${g.featured?'🔥 ':''}${esc(g.name)}</div>
        <div class="goods-meta">${catMap[g.category]||g.category} · ¥${g.price||'--'} · ${g.imgCount}图</div>
      </div>
      ${!editMode?`<div class="goods-actions"><span onclick="editGoods('${g.id}')">✎</span><span onclick="delGoods('${g.id}')" style="color:#e53935;">🗑</span></div>`:''}
    </div>`).join('');
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ============ 编辑模式 ============
function toggleEditMode() {
  editMode = !editMode;
  goods.forEach(g => g._checked = false);
  document.getElementById('editModeBtn').style.background = editMode?'var(--pink)':'#fff';
  document.getElementById('editModeBtn').style.color = editMode?'#fff':'var(--muted)';
  render();
}

function toggleCheck(id) {
  const g = goods.find(x=>x.id===id);
  if (g) g._checked = !g._checked;
  render();
}

function selectAll() {
  const all = goods.filter(g=>g._checked).length === goods.length;
  goods.forEach(g => g._checked = !all);
  render();
}

async function batchDelete() {
  const ids = goods.filter(g=>g._checked).map(g=>g.id);
  if (!ids.length || !confirm(`删除已选 ${ids.length} 件？`)) return;
  for (const id of ids) await sb.from('goods').delete().eq('id',id);
  editMode = false;
  toast(`已删除${ids.length}件`);
  loadGoods();
}

async function delGoods(id) {
  if (!confirm('删除这件商品？')) return;
  await sb.from('goods').delete().eq('id',id);
  toast('已删除');
  loadGoods();
}

// ============ 弹窗 ============
function openModal() { editGoods(null); }

function editGoods(id) {
  document.getElementById('gId').value = id||'';
  document.getElementById('modalTitle').textContent = id?'编辑商品':'添加商品';
  document.getElementById('gCategory').innerHTML = CATS.map(c=>`<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');
  document.getElementById('seasonTags').innerHTML = SEASONS.map(s=>`<span class="tag-chip" onclick="this.classList.toggle('on');updateSeason()">${s}季</span>`).join('');

  if (id) {
    const g = goods.find(x=>x.id===id);
    if (!g) return;
    document.getElementById('gName').value = g.name;
    document.getElementById('gCategory').value = g.category;
    document.getElementById('gPrice').value = g.price||'';
    document.getElementById('gNotes').value = g.notes||'';
    document.getElementById('gFeatured').value = g.featured||false;
    editImages = g.images||[];
    if (!editImages.length && g.image) editImages = [g.image];
    document.querySelectorAll('#seasonTags .tag-chip').forEach(el => {
      if ((g.season||[]).includes(el.textContent.replace('季',''))) el.classList.add('on');
    });
  } else {
    document.getElementById('gName').value = '';
    document.getElementById('gPrice').value = '';
    document.getElementById('gNotes').value = '';
    document.getElementById('gFeatured').value = 'false';
    editImages = [];
    document.querySelectorAll('#seasonTags .tag-chip').forEach(el => el.classList.remove('on'));
  }
  updateSeason();
  renderImages();
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').style.display = 'none';
}

// ============ 图片 ============
function chooseImages() {
  if (editImages.length >= 9) { toast('最多9张'); return; }
  document.getElementById('fileInput').click();
}

function handleFiles(input) {
  const files = Array.from(input.files).slice(0, 9 - editImages.length);
  files.forEach(file => {
    if (file.size > 5*1024*1024) { toast('图片太大'); return; }
    const reader = new FileReader();
    reader.onload = e => { editImages.push(e.target.result); renderImages(); };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function removeImage(i) { editImages.splice(i,1); renderImages(); }

function renderImages() {
  document.getElementById('imgCount').textContent = editImages.length;
  const grid = document.getElementById('imgGrid');
  grid.innerHTML = editImages.map((src,i) => `
    <div class="img-cell"><img src="${src}"><div class="del" onclick="removeImage(${i})">✕</div></div>
  `).join('') + (editImages.length<9?`<div class="img-add" onclick="chooseImages()">+</div>`:'');
}

// ============ 保存 ============
function updateSeason() {
  const s = Array.from(document.querySelectorAll('#seasonTags .tag-chip.on')).map(el=>el.textContent.replace('季',''));
  document.getElementById('gSeason').value = JSON.stringify(s);
}

async function save(e) {
  e.preventDefault();
  updateSeason();
  const id = document.getElementById('gId').value;
  const payload = {
    name: document.getElementById('gName').value.trim(),
    category: document.getElementById('gCategory').value,
    price: parseFloat(document.getElementById('gPrice').value)||0,
    notes: document.getElementById('gNotes').value.trim(),
    season: JSON.parse(document.getElementById('gSeason').value||'[]'),
    images: editImages,
    image: editImages.length>0?editImages[0]:'',
    featured: document.getElementById('gFeatured').value==='true'
  };
  if (!payload.name) { toast('请输入名称'); return; }

  if (id) {
    await sb.from('goods').update(payload).eq('id',id);
    toast('已更新');
  } else {
    await sb.from('goods').insert([{...payload, created_at:new Date().toISOString()}]);
    toast('已上架');
  }
  closeModal();
  loadGoods();
}

function toast(msg) {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  c.appendChild(el);
  setTimeout(()=>el.remove(),2200);
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
</body>
</html>
